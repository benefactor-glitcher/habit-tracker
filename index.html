<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Habit Tracker Dashboard – stabil</title>

<style>
/* -------- Basis -------- */
:root {
  --bg: #f2f4f8;
  --fg: #111;
  --box: #ffffff;
  --border: #ddd;
  --accent: #3b82f6;
  --muted: #666;
  font-size: 14px; /* Basis für iPhone SE */
}

body {
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: var(--bg);
  color: var(--fg);
  padding: 12px;
  margin: 0;
}

/* -------- Dark Mode -------- */
body.dark {
  --bg: #0f172a;
  --fg: #e5e7eb;
  --box: #1e293b;
  --border: #334155;
  --muted: #9ca3af;
}

/* -------- Typo -------- */
h1 {
  font-size: 1.4rem;
  margin: 4px 0;
}
h2 {
  font-size: 1.1rem;
  margin: 6px 0;
}
small {
  color: var(--muted);
  font-size: 0.8rem;
}

/* -------- Boxen -------- */
.box {
  background: var(--box);
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

/* -------- Tabelle -------- */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem; /* sehr wichtig fürs SE */
}

th, td {
  border: 1px solid var(--border);
  padding: 4px;
  text-align: center;
}

th {
  background: rgba(0,0,0,0.04);
}

/* -------- Große Checkboxen -------- */
input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: var(--accent);
}

/* -------- Texteingaben -------- */
input[type="text"] {
  width: 100%;
  font-size: 0.75rem;
  padding: 4px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--box);
  color: var(--fg);
}

/* -------- Buttons -------- */
button {
  font-size: 0.8rem;
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: white;
}
</style>
</head>

<body>

<h1>🔥 My Way 2 the Top 💪🏽</h1>
<small>Stabil · Lokal · Nachvollziehbar</small>

<button id="darkToggle">🌙 Dark Mode</button>

<div class="box">
  <h2>💡 Tagesimpuls</h2>
  <p class="quote" id="quote"></p>
</div>

<div class="box">
  <button onclick="prevWeek()">← Woche</button>
  <button onclick="nextWeek()">Woche →</button>
  <strong id="weekLabel"></strong>
</div>

<div class="box">
<table>
<thead>
<tr>
  <th>Datum</th>
  <th>Schlaf (22-5)</th>
  <th>Yoga</th>
  <th>3x Fitnessringe</th>
  <th>10k Steps</th>
  <th>Protein mind. 200g</th>
  <th>Wasser mind. 2L</th>
  <th>No P*rn</th>
  <th>Teeth a.m.</th>
  <th>Teeth p.m.</th>
  <th>Fokus</th>
  <th>Selfcare</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="box">
  <h2>🎯 Fokus‑Habit der Woche</h2>
  <input id="focusText" placeholder="z. B. kein Handy ab 21:00">
</div>

<div class="box">
  <h2>🔥 Streak</h2>
  <p id="streak"></p>
</div>

<script>
// ---------------- BASIC SETUP ----------------
const HABITS = [
  "sleep","morning","strength","steps",
  "protein","water","noporn","teethAM","teethPM","focus"
];

let weekOffset = 0;

// ---------------- DATE HELPERS ----------------
function mondayOf(date) {
  const d = new Date(date);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return d;
}
function iso(d) {
  return d.toISOString().slice(0,10);
}
function de(d) {
  return d.toLocaleDateString("de-DE");
}

// ---------------- RENDER ----------------
function render() {
  const base = new Date();
  base.setDate(base.getDate() + weekOffset);
  const monday = mondayOf(base);

  weekLabel.textContent = "KW ab " + de(monday);

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  let streakCount = 0;

  for (let i=0;i<7;i++) {
    const day = new Date(monday);
    day.setDate(monday.getDate()+i);
    const key = iso(day);

    const data = JSON.parse(localStorage.getItem(key)) || {};

    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${de(day)}</td>`;

    HABITS.forEach(h => {
      const td = document.createElement("td");

      if (h === "care") return;

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = data[h] === true;

      cb.onchange = () => {
        data[h] = cb.checked;
        localStorage.setItem(key, JSON.stringify(data));
        render();
      };

      td.appendChild(cb);
      tr.appendChild(td);
    });

    const careTd = document.createElement("td");
    const careInput = document.createElement("input");
    careInput.type = "text";
    careInput.value = data.care || "";
    careInput.onchange = () => {
      data.care = careInput.value;
      localStorage.setItem(key, JSON.stringify(data));
    };
    careTd.appendChild(careInput);
    tr.appendChild(careTd);

    tbody.appendChild(tr);

    // Streak zählen
    const score = HABITS.filter(h=>data[h]).length;
    if (score >= 5) streakCount++;
  }

  streak.textContent = streakCount > 0
    ? `🔥 ${streakCount} aktive Tage diese Woche`
    : "Serie starten 👍";

  focusText.value = localStorage.getItem("focusText") || "";
  focusText.onchange = () =>
    localStorage.setItem("focusText", focusText.value);
}

// ---------------- NAV ----------------
function nextWeek(){ weekOffset+=7; render(); }
function prevWeek(){ weekOffset-=7; render(); }

// ---------------- QUOTES ----------------
const quotes = [
  "Nicht perfekt – aber konsequent.",
  "Heute zählt.",
  "Kleine Schritte, große Wirkung.",
  "Du ziehst das durch.",
  "Stark ist, wer dranbleibt."
];
quote.textContent = quotes[new Date().getDate() % quotes.length];

// ---------------- INIT ----------------
render();


// -------- Dark Mode Toggle --------
const toggle = document.getElementById("darkToggle");

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
}

toggle.onclick = () => {
  document.body.classList.toggle("dark");
  localStorage.setItem(
    "theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
};
</script>

</body>
</html>
