<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Way</title>

<style>
/* =====================
   THEME
   ===================== */
:root {
  --bg: #f2f4f8;
  --fg: #111;
  --box: #ffffff;
  --border: #d1d5db;
  --accent: #2563eb;
  --muted: #6b7280;
  font-size: 15px;
}

body.dark {
  --bg: #0f172a;
  --fg: #e5e7eb;
  --box: #1e293b;
  --border: #334155;
  --muted: #9ca3af;
}

/* =====================
   BASE
   ===================== */
body {
  margin: 0;
  padding: 12px;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: var(--bg);
  color: var(--fg);
}

/* =====================
   STICKY HEADER
   ===================== */
header {
  position: sticky;
  top: 0;
  background: var(--bg);
  padding-bottom: 8px;
  z-index: 50;
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-center {
  text-align: center;
}

.header-center strong {
  display: block;
}

small {
  color: var(--muted);
}

/* =====================
   BUTTONS
   ===================== */
button {
  border: none;
  background: var(--accent);
  color: white;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 0.85rem;
}

.icon-btn {
  padding: 6px 8px;
  font-size: 1rem;
}

/* =====================
   DAY CARD
   ===================== */
.day-card {
  background: var(--box);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  margin-top: 12px;
}

/* =====================
   HABITS
   ===================== */
.habit {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 6px;
  border-bottom: 1px solid var(--border);
  font-size: 0.95rem;
}

.habit:last-child {
  border-bottom: none;
}

input[type="checkbox"] {
  width: 26px;
  height: 26px;
  accent-color: var(--accent);
}

/* =====================
   NOTES
   ===================== */
input[type="text"] {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  font-size: 0.9rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--box);
  color: var(--fg);
}
/* =====================
   SLIDE ANIMATION
   ===================== */
.slide-out-left {
  animation: slideOutLeft 0.18s ease-in forwards;
}

.slide-out-right {
  animation: slideOutRight 0.18s ease-in forwards;
}

.slide-in-left {
  animation: slideInLeft 0.18s ease-out forwards;
}

.slide-in-right {
  animation: slideInRight 0.18s ease-out forwards;
}

@keyframes slideOutLeft {
  from { transform: translateX(0); opacity: 1; }
  to   { transform: translateX(-40px); opacity: 0; }
}

@keyframes slideOutRight {
  from { transform: translateX(0); opacity: 1; }
  to   { transform: translateX(40px); opacity: 0; }
}

@keyframes slideInLeft {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

@keyframes slideInRight {
  from { transform: translateX(-40px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
</style>
</head>

<body>

<header>
  <div class="header-row">
    <button class="icon-btn" onclick="prevDay()">←</button>

    <div class="header-center">
      <strong id="dateLabel"></strong>
      <small id="weekLabel"></small>
    </div>

    <button class="icon-btn" onclick="nextDay()">→</button>
  </div>

  <div class="header-row" style="margin-top:6px">
    <small>🔥 My Way 2 the Top</small>
    <button id="darkToggle" class="icon-btn">🌙</button>
  </div>
</header>

<section class="day-card" id="dayCard"></section>

<input id="noteInput" placeholder="Notiz / Selfcare / Gedanken…">

<script>
/* =====================
   STATE
   ===================== */
const HABITS = [
  "Schlafhygiene eingehalten (22:00–05:00)",
  "Morgensport / Yoga",
  "Alle 3x Aktivitätsringe abgeschlossen",
  "10k Alltagsschritte gemacht",
  "Protein mind. 200g",
  "Pures Wasser mind. 2L",
  "No P*rn",
  "Zähne putzen Morgens & Abends"
];

let currentDate = new Date();

/* =====================
   DATE HELPERS
   ===================== */
function iso(d){ return d.toISOString().slice(0,10); }

function weekNumber(d){
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}

/* =====================
   RENDER
   ===================== */
function renderDay() {
  const key = iso(currentDate);
  const data = JSON.parse(localStorage.getItem(key)) || {};

  dateLabel.textContent =
    currentDate.toLocaleDateString("de-DE", { weekday:"long", day:"2-digit", month:"2-digit", year:"numeric" });

  weekLabel.textContent = "Kalenderwoche " + weekNumber(currentDate);

  const card = document.getElementById("dayCard");
  card.innerHTML = "";

  HABITS.forEach(h => {
    const row = document.createElement("div");
    row.className = "habit";

    const label = document.createElement("span");
    label.textContent = h;

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = data[h] === true;

    cb.onchange = () => {
      data[h] = cb.checked;
      localStorage.setItem(key, JSON.stringify(data));
    };

    row.appendChild(label);
    row.appendChild(cb);
    card.appendChild(row);
  });

  noteInput.value = data.note || "";
  noteInput.onchange = () => {
    data.note = noteInput.value;
    localStorage.setItem(key, JSON.stringify(data));
  };
}

/* =====================
   NAV
   ===================== */
function nextDay() {
  animateDay("left", () => {
    currentDate.setDate(currentDate.getDate() + 1);
  });
}

function prevDay() {
  animateDay("right", () => {
    currentDate.setDate(currentDate.getDate() - 1);
  });
}

function animateDay(direction, changeDate) {
  const card = document.getElementById("dayCard");

  // raus animieren
  card.classList.add(
    direction === "left" ? "slide-out-left" : "slide-out-right"
  );

  setTimeout(() => {
    changeDate();        // Datum ändern
    renderDay();         // Neu rendern

    // rein animieren
    card.classList.remove("slide-out-left", "slide-out-right");
    card.classList.add(
      direction === "left" ? "slide-in-right" : "slide-in-left"
    );

    // Cleanup
    setTimeout(() => {
      card.classList.remove("slide-in-left", "slide-in-right");
    }, 180);

  }, 180);
}
``
/* =====================
   DARK MODE
   ===================== */
if(localStorage.getItem("theme")==="dark") document.body.classList.add("dark");

darkToggle.onclick = () => {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark") ? "dark" : "light");
};

/* =====================
   INIT
   ===================== */
renderDay();
/* =====================
   SWIPE NAVIGATION
   ===================== */
let touchStartX = 0;
let touchEndX = 0;

const swipeThreshold = 60; // px – fühlt sich gut auf iPhone SE an

document.addEventListener("touchstart", e => {
  touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", e => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
});

function handleSwipe() {
  const diff = touchEndX - touchStartX;

  if (Math.abs(diff) < swipeThreshold) return;

  if (diff > 0) {
    prevDay();   // 👉 Swipe RIGHT
  } else {
    nextDay();   // 👉 Swipe LEFT
  }
}
</script>

</body>
</html>
